<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO -->
    <title>NexCart | Modern Ecommerce Store</title>

    <meta
      name="description"
      content="NexCart is a modern ecommerce platform offering premium products, fast shopping experience, secure checkout, and wishlist features."
    />

    <meta
      name="keywords"
      content="NexCart, ecommerce, online shopping, electronics, fashion, wishlist, cart, secure checkout"
    />

    <meta name="author" content="NexCart Team" />
    <meta name="theme-color" content="#0f172a" />

    <!-- Open Graph / Facebook -->
    <meta property="og:title" content="NexCart | Modern Ecommerce Store" />
    <meta
      property="og:description"
      content="Discover premium products with a modern shopping experience on NexCart."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="%PUBLIC_URL%/preview.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="NexCart" />
    <meta
      name="twitter:description"
      content="Modern ecommerce experience with fast checkout and wishlist features."
    />
    <meta name="twitter:image" content="%PUBLIC_URL%/preview.png" />

    <!-- Favicon -->
    <link rel="icon" href="%PUBLIC_URL%/icon2.png" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/icon2.png" />

    <!-- Manifest -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Global Font -->
    <style>
      body {
        margin: 0;
        font-family: "Inter", sans-serif;
        background-color: #020617;
      }

      * {
        box-sizing: border-box;
      }
    </style>
  </head>

  <body>
    <noscript> JavaScript is required to run NexCart properly. </noscript>

    <div id="root"></div>
  </body>
</html>
